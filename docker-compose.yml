services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coffee_pos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coffee_pos}
      POSTGRES_DB: ${POSTGRES_DB:-coffee_pos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coffee_pos} -d ${POSTGRES_DB:-coffee_pos}"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-coffee_pos}:${POSTGRES_PASSWORD:-coffee_pos}@postgres:5432/${POSTGRES_DB:-coffee_pos}?schema=public
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
